<!DOCTYPE html>
<html>
<head>
  <title>GremioDirecto</title>
  <style>
    body { font-family: Arial; max-width: 600px; margin: 50px auto; padding: 20px; }
    .user { background: #f0f8ff; padding: 15px; margin: 10px 0; border-radius: 8px; }
    button { background: #007AFF; color: white; padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #0056CC; }
    #loading { color: #666; }
  </style>
</head>
<body>
  <h1>🛠️ GremioDirecto Users</h1>
  <button onclick="addUser()">➕ Add Worker</button>
  <button onclick="refreshUsers()">🔄 Refresh</button>
  <div id="users"></div>
  <div id="status">Loading...</div>

  <script>
    const API_BASE = 'http://127.0.0.1:5000';

    async function fetchUsers() {
      document.getElementById('status').textContent = 'Loading...';
      try {
        const response = await fetch(`${API_BASE}/users`);
        const data = await response.json();
        displayUsers(data.users);
        document.getElementById('status').textContent = `${data.users.length} users`;
      } catch (error) {
        document.getElementById('status').textContent = `Error: ${error}`;
      }
    }

    async function addUser() {
      const userData = {
        type: 'worker',
        name: `Pepe ${Date.now()}`,
        email: `pepe${Date.now()}@gremiodirecto.com`
      };
      
      try {
        await fetch(`${API_BASE}/users`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(userData)
        });
        refreshUsers();
      } catch (error) {
        alert(`Error: ${error}`);
      }
    }

    function displayUsers(users) {
      document.getElementById('users').innerHTML = users.map(user => `
        <div class="user">
          <strong>${user.name}</strong> 
          <span style="color: #666;">(${user.type})</span><br>
          📧 ${user.email} | 🗣️ ${user.language}
        </div>
      `).join('') || '<p>No users yet</p>';
    }

    function refreshUsers() {
      fetchUsers();
    }

    // Load users on page load
    fetchUsers();
  </script>
</body>
</html>
